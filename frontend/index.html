<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音无水印提取工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            margin: 40px 0;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5a6fd8;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 5px;
            background: #f9f9f9;
        }
        
        .result h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }
        
        .video-info {
            margin-bottom: 15px;
        }
        
        .video-info p {
            margin-bottom: 5px;
            color: #666;
        }
        
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        .download-btn:hover {
            background: #45a049;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 20px 0;
            }
            
            h1 {
                font-size: 20px;
            }
            
            input,
            button {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>抖音无水印视频提取</h1>
        
        <div class="input-group">
            <label for="douyinUrl">抖音视频链接</label>
            <input type="text" id="douyinUrl" placeholder="请输入抖音视频链接，例如：https://v.douyin.com/xxxx/">
        </div>
        
        <button id="extractBtn">提取视频</button>
        
        <div id="result" class="result" style="display: none;">
            <h2>提取结果</h2>
            <div class="video-info">
                <p><strong>标题：</strong><span id="videoTitle"></span></p>
                <p><strong>作者：</strong><span id="videoAuthor"></span></p>
            </div>
            <a id="downloadLink" class="download-btn" href="" target="_blank">下载无水印视频</a>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
    </div>
    
    <script>
        document.getElementById('extractBtn').addEventListener('click', async function() {
            const url = document.getElementById('douyinUrl').value.trim();
            const extractBtn = document.getElementById('extractBtn');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            
            // 输入验证
            if (!url) {
                error.textContent = '请输入抖音视频链接';
                error.style.display = 'block';
                return;
            }
            
            // 验证链接格式 - 支持包含额外文本的链接
            const douyinRegex = /(?:v\.douyin\.com\/|douyin\.com\/video\/|aweme\.snssdk\.com\/aweme\/v1\/play\/)/;
            // 首先尝试从文本中提取链接
            const linkRegex = /(https?:\/\/[\w\-\.]+\/[\w\-]+(?:\/[\w\-]+)*)/;
            const linkMatch = url.match(linkRegex);
            const actualUrl = linkMatch ? linkMatch[1] : url;
            
            if (!douyinRegex.test(actualUrl)) {
                error.textContent = '请输入有效的抖音视频链接';
                error.style.display = 'block';
                return;
            }
            
            // 显示加载状态
            extractBtn.disabled = true;
            extractBtn.innerHTML = '<div class="loading"></div> 提取中...';
            error.style.display = 'none';
            result.style.display = 'none';
            
            try {
                // 使用提取出的实际链接
                const requestUrl = linkMatch ? linkMatch[1] : url;
                const response = await fetch(`https://douyin-pi-gilt.vercel.app/api/extract?url=${encodeURIComponent(requestUrl)}`);
                
                if (!response.ok) {
                    throw new Error('服务器响应失败');
                }
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.data.videoUrl) {
                        document.getElementById('videoTitle').textContent = data.data.title || '未知标题';
                        document.getElementById('videoAuthor').textContent = data.data.author || '未知作者';
                        document.getElementById('downloadLink').href = data.data.videoUrl;
                        result.style.display = 'block';
                    } else {
                        error.textContent = '未找到视频链接，请检查视频是否存在';
                        error.style.display = 'block';
                    }
                } else {
                    error.textContent = data.message || '提取失败';
                    error.style.display = 'block';
                }
            } catch (err) {
                console.error('提取视频失败:', err);
                error.textContent = '网络错误，请稍后重试或检查网络连接';
                error.style.display = 'block';
            } finally {
                extractBtn.disabled = false;
                extractBtn.innerHTML = '提取视频';
            }
        });
    </script>
</body>
</html>
